<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Scala Native binary size visualiser</title>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
        <script src="raw.js"></script>
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            :root {
                --color-background-primary: #ffffff;
                --color-background-secondary: #f5f5f3;
                --color-text-primary: #1a1a18;
                --color-text-secondary: #5f5e5a;
                --color-border-tertiary: rgba(0, 0, 0, 0.15);
                --color-border-secondary: rgba(0, 0, 0, 0.3);
                --font-mono: "JetBrains Mono", "Fira Mono", monospace;
            }
            @media (prefers-color-scheme: dark) {
                :root {
                    --color-background-primary: #1e1e1c;
                    --color-background-secondary: #2a2a28;
                    --color-text-primary: #f0ede6;
                    --color-text-secondary: #b4b2a9;
                    --color-border-tertiary: rgba(255, 255, 255, 0.15);
                    --color-border-secondary: rgba(255, 255, 255, 0.3);
                }
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
            }
            body {
                font-family: var(--font-mono);
                background: var(--color-background-secondary);
                color: var(--color-text-primary);
                padding: 1.5rem;
                display: flex;
                flex-direction: column;
            }
            h1 {
                font-size: 15px;
                font-weight: 500;
                margin-bottom: 1rem;
                color: var(--color-text-secondary);
                letter-spacing: 0.05em;
                text-transform: lowercase;
            }
            #controls {
                display: flex;
                gap: 16px;
                align-items: center;
                padding: 0 0 0.75rem;
                flex-wrap: wrap;
            }
            #controls label {
                font-size: 12px;
                color: var(--color-text-secondary);
                display: flex;
                align-items: center;
                gap: 8px;
            }
            #filter-prefix {
                font-family: var(--font-mono);
                font-size: 12px;
                background: var(--color-background-primary);
                color: var(--color-text-primary);
                border: 0.5px solid var(--color-border-secondary);
                border-radius: 4px;
                padding: 3px 8px;
                width: 220px;
                outline: none;
            }
            #filter-prefix::placeholder {
                color: var(--color-text-secondary);
            }
            #breadcrumb {
                font-size: 12px;
                color: var(--color-text-secondary);
                padding: 0 0 0.5rem;
                min-height: 1.5rem;
            }
            #breadcrumb span {
                cursor: pointer;
                color: #378add;
            }
            #breadcrumb span:hover {
                text-decoration: underline;
            }
            #treemap-wrap {
                position: relative;
                width: 100%;
                flex: 1;
                min-height: 0;
            }
            #tm {
                display: block;
                width: 100%;
                height: 100%;
            }
            #tooltip {
                position: absolute;
                pointer-events: none;
                display: none;
                background: var(--color-background-primary);
                border: 0.5px solid var(--color-border-secondary);
                border-radius: 8px;
                padding: 8px 12px;
                font-size: 12px;
                max-width: 320px;
                color: var(--color-text-primary);
                z-index: 10;
                font-family: var(--font-mono);
            }
            #tooltip .tt-name {
                font-weight: 500;
                margin-bottom: 2px;
                word-break: break-all;
            }
            #tooltip .tt-size {
                color: var(--color-text-secondary);
            }
            svg text {
                font-family: var(--font-mono);
            }
        </style>
    </head>
    <body>
        <h1>Scala Native binary size visualiser</h1>
        <h2 id="filename"></h2>
        <h3>Total length of symbol names: <span id="symbols_total"></span></h3>
        <div id="controls">
            <label
                >prefix filter
                <input
                    type="text"
                    id="filter-prefix"
                    placeholder="e.g. scala.collection"
                />
            </label>
        </div>
        <div id="breadcrumb"></div>
        <div id="treemap-wrap">
            <svg id="tm"></svg>
            <div id="tooltip"></div>
        </div>

        <script>
            document.getElementById("filename").innerText = FILENAME;
            document.getElementById("symbols_total").innerText =
                fmtBytes(SYMBOL_NAMES_TOTAL);
            const RAMPS = [
                [
                    "#E6F1FB",
                    "#B5D4F4",
                    "#85B7EB",
                    "#378ADD",
                    "#185FA5",
                    "#0C447C",
                    "#042C53",
                ],
                [
                    "#E1F5EE",
                    "#9FE1CB",
                    "#5DCAA5",
                    "#1D9E75",
                    "#0F6E56",
                    "#085041",
                    "#04342C",
                ],
                [
                    "#EEEDFE",
                    "#CECBF6",
                    "#AFA9EC",
                    "#7F77DD",
                    "#534AB7",
                    "#3C3489",
                    "#26215C",
                ],
                [
                    "#FAEEDA",
                    "#FAC775",
                    "#EF9F27",
                    "#BA7517",
                    "#854F0B",
                    "#633806",
                    "#412402",
                ],
                [
                    "#FAECE7",
                    "#F5C4B3",
                    "#F0997B",
                    "#D85A30",
                    "#993C1D",
                    "#712B13",
                    "#4A1B0C",
                ],
                [
                    "#EAF3DE",
                    "#C0DD97",
                    "#97C459",
                    "#639922",
                    "#3B6D11",
                    "#27500A",
                    "#173404",
                ],
            ];

            function fmtBytes(b) {
                if (b >= 1048576) return (b / 1048576).toFixed(1) + "M";
                if (b >= 1024) return (b / 1024).toFixed(1) + "K";
                return b + " B";
            }

            function buildTree(symbols) {
                const maxDepth = Infinity;
                const minSize = 0;
                const root = { name: "root", children: {}, size: 0 };
                for (const [sym, size] of symbols) {
                    if (size <= 0) continue;
                    const dotPart = sym.replace(/\(.*/, "");
                    const parts = dotPart.split(".").slice(0, maxDepth);
                    let node = root;
                    for (let i = 0; i < parts.length; i++) {
                        const p = parts[i];
                        if (!node.children[p])
                            node.children[p] = {
                                name: p,
                                children: {},
                                size: 0,
                                fullPath: parts.slice(0, i + 1).join("."),
                            };
                        node = node.children[p];
                    }
                    node.size += size;
                    let n = root;
                    for (const p of parts) {
                        n.size += size;
                        n = n.children[p];
                    }
                }
                function toHier(node, depth) {
                    const ch = Object.values(node.children)
                        .filter((c) => c.size >= minSize)
                        .map((c) => toHier(c, depth + 1));
                    if (ch.length)
                        return {
                            name: node.name,
                            children: ch,
                            value: 0,
                            fullPath: node.fullPath,
                            totalSize: node.size,
                        };
                    return {
                        name: node.name,
                        value: node.size,
                        fullPath: node.fullPath,
                        totalSize: node.size,
                    };
                }
                return {
                    name: "root",
                    children: Object.values(root.children)
                        .filter((c) => c.size >= minSize)
                        .map((c) => toHier(c, 0)),
                    totalSize: root.size,
                };
            }

            // colorMap is stable across renders for a given dataset so root
            // nodes always keep the same colour.
            let colorMap = {};

            // currentNode is a node from the full tree (returned by buildTree).
            // ancestry is the stack of ancestors for breadcrumb navigation.
            let currentNode = null;
            let ancestry = [];

            function getActiveData() {
                const pfx = document
                    .getElementById("filter-prefix")
                    .value.trim();
                return pfx
                    ? RAW.filter(([sym]) => {
                          const dot = sym.replace(/\(.*/, "");
                          return dot === pfx || dot.startsWith(pfx + ".");
                      })
                    : RAW;
            }

            function rebuildRoot() {
                const tree = buildTree(getActiveData());
                // Assign stable colours to top-level nodes.
                colorMap = {};
                (tree.children || []).forEach(
                    (c, i) => (colorMap[c.name] = RAMPS[i % RAMPS.length]),
                );
                currentNode = tree;
                ancestry = [];
            }

            function getColor(nodeName, depth, lightIdx) {
                const ramp = colorMap[nodeName] || RAMPS[0];
                const idx = Math.min(depth, ramp.length - 1);
                return ramp[lightIdx !== undefined ? lightIdx : idx];
            }

            // Render one level: the direct children of currentNode as flat tiles.
            // Each child is treated as a leaf for layout (sized by totalSize),
            // so clicking drills into it.
            function render() {
                const wrap = document.getElementById("treemap-wrap");
                const W = wrap.clientWidth || 700;
                const H = wrap.clientHeight || 400;
                const svg = d3.select("#tm").attr("width", W).attr("height", H);
                svg.selectAll("*").remove();

                const children = currentNode.children || [];

                // Build a flat D3 hierarchy: root with one level of children.
                // Each child's value is its totalSize so relative areas are correct.
                const flatRoot = {
                    name: currentNode.name,
                    children: children.map((c) => ({
                        name: c.name,
                        fullPath: c.fullPath,
                        totalSize: c.totalSize,
                        hasChildren: !!(c.children && c.children.length),
                        _ref: c,
                        value: c.totalSize,
                    })),
                };

                const hier = d3
                    .hierarchy(flatRoot)
                    .sum((d) => d.value || 0)
                    .sort((a, b) => b.value - a.value);

                d3
                    .treemap()
                    .size([W, H])
                    .paddingInner(2)
                    .paddingOuter(3)
                    .round(true)(hier);

                // Determine the top-level colour key for each tile.
                // If we are at root level the tile itself is the top-level node.
                // If we are deeper, inherit the colour from the ancestry root.
                const topName = ancestry.length > 0 ? ancestry[0].name : null;

                const cell = svg
                    .selectAll("g")
                    .data(hier.children || [])
                    .enter()
                    .append("g")
                    .attr("transform", (d) => `translate(${d.x0},${d.y0})`);

                cell.append("rect")
                    .attr("width", (d) => Math.max(0, d.x1 - d.x0))
                    .attr("height", (d) => Math.max(0, d.y1 - d.y0))
                    .attr("fill", (d) => {
                        const name = topName || d.data.name;
                        const depth = ancestry.length;
                        return getColor(
                            name,
                            depth,
                            d.data.hasChildren ? 1 : 2,
                        );
                    })
                    .attr("stroke", (d) => {
                        const name = topName || d.data.name;
                        return getColor(name, ancestry.length, 4);
                    })
                    .attr("stroke-width", 0.5)
                    .style("cursor", (d) =>
                        d.data.hasChildren ? "pointer" : "default",
                    )
                    .on("click", (e, d) => {
                        if (!d.data.hasChildren) return;
                        ancestry.push(currentNode);
                        currentNode = d.data._ref;
                        updateBreadcrumb();
                        render();
                    })
                    .on("mousemove", (e, d) => {
                        const tt = document.getElementById("tooltip");
                        const rect = wrap.getBoundingClientRect();
                        tt.style.display = "block";
                        tt.style.left = e.clientX - rect.left + 12 + "px";
                        tt.style.top = e.clientY - rect.top - 10 + "px";
                        tt.innerHTML = `<div class="tt-name">${d.data.fullPath || d.data.name}</div><div class="tt-size">${fmtBytes(d.data.totalSize || 0)}</div>`;
                    })
                    .on("mouseleave", () => {
                        document.getElementById("tooltip").style.display =
                            "none";
                    });

                const labelCells = cell.filter(
                    (d) => d.x1 - d.x0 > 40 && d.y1 - d.y0 > 18,
                );

                labelCells
                    .append("text")
                    .attr("x", 5)
                    .attr("y", (d) => Math.min(17, (d.y1 - d.y0) / 2 + 4))
                    .attr("font-size", 12)
                    .attr("font-weight", (d) =>
                        d.data.hasChildren ? 600 : 400,
                    )
                    .attr("fill", (d) => {
                        const name = topName || d.data.name;
                        return getColor(name, ancestry.length, 6);
                    })
                    .attr("pointer-events", "none")
                    .text((d) => {
                        const w = d.x1 - d.x0;
                        const label = d.data.name;
                        const maxChars = Math.floor(w / 7.5);
                        return label.length > maxChars
                            ? label.slice(0, maxChars - 1) + "…"
                            : label;
                    });

                labelCells
                    .filter((d) => d.y1 - d.y0 > 32)
                    .append("text")
                    .attr("x", 5)
                    .attr("y", (d) => Math.min(30, (d.y1 - d.y0) / 2 + 18))
                    .attr("font-size", 11)
                    .attr("fill", (d) => {
                        const name = topName || d.data.name;
                        return getColor(name, ancestry.length, 5);
                    })
                    .attr("pointer-events", "none")
                    .text((d) => fmtBytes(d.data.totalSize || 0));
            }

            function updateBreadcrumb() {
                const bc = document.getElementById("breadcrumb");
                if (ancestry.length === 0) {
                    bc.innerHTML = "";
                    return;
                }
                const parts = ancestry.map((node, i) => {
                    const label =
                        node.name === "root"
                            ? "root"
                            : (node.fullPath || node.name).split(".").pop();
                    return `<span onclick="navigateToAncestor(${i})">${label}</span>`;
                });
                const currentLabel = `<strong>${(currentNode.fullPath || currentNode.name).split(".").pop()}</strong>`;
                bc.innerHTML = [...parts, currentLabel].join(" / ");
            }

            window.navigateToAncestor = function (i) {
                currentNode = ancestry[i];
                ancestry = ancestry.slice(0, i);
                updateBreadcrumb();
                render();
            };

            document.getElementById("filter-prefix").oninput = function () {
                rebuildRoot();
                updateBreadcrumb();
                render();
            };

            rebuildRoot();
            render();
            window.addEventListener("resize", render);
        </script>
    </body>
</html>
